<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>狼牙团队监控仪表盘 | WolfPack Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f1419;
            color: #e6edf3;
            min-height: 100vh;
        }
        
        .header {
            background: linear-gradient(135deg, #1a2332 0%, #0f1419 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
            background: linear-gradient(90deg, #58a6ff, #238636);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #238636;
            animation: pulse 2s infinite;
        }
        
        .status-dot.error {
            background: #da3633;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        /* 加载动画 */
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 20, 25, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s;
        }
        
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .loading-text {
            margin-top: 15px;
            color: #8b949e;
            font-size: 14px;
        }
        
        /* 刷新指示器 */
        .refresh-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: #8b949e;
        }
        
        .refresh-icon {
            width: 16px;
            height: 16px;
            border: 2px solid #30363d;
            border-top-color: #58a6ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        .refresh-icon.idle {
            animation: none;
            border-color: #238636;
        }
        
        .container {
            padding: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        /* ==================== H5移动端适配 ==================== */
        @media screen and (max-width: 768px) {
            /* 头部适配 */
            .header {
                padding: 15px 20px;
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .header-controls {
                width: 100%;
                justify-content: center;
                flex-wrap: wrap;
                gap: 10px;
            }
            
            .status-indicator {
                font-size: 12px;
            }
            
            /* 容器适配 */
            .container {
                padding: 15px;
            }
            
            /* 指标卡片单列显示 */
            .metrics-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                margin-bottom: 20px;
            }
            
            .metric-card {
                padding: 15px;
            }
            
            .metric-label {
                font-size: 11px;
            }
            
            .metric-value {
                font-size: 24px;
            }
            
            /* 区块适配 */
            .section {
                margin-bottom: 15px;
                border-radius: 10px;
            }
            
            .section-header {
                padding: 12px 15px;
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            
            .section-title {
                font-size: 14px;
            }
            
            .refresh-btn {
                padding: 6px 12px;
                font-size: 12px;
                align-self: flex-end;
            }
            
            /* 代理卡片单列显示 */
            .agent-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 15px;
            }
            
            .agent-card {
                padding: 15px;
            }
            
            .agent-header {
                margin-bottom: 12px;
            }
            
            .agent-name {
                font-size: 16px;
            }
            
            .agent-role {
                font-size: 10px;
                padding: 3px 8px;
            }
            
            .agent-status {
                font-size: 12px;
            }
            
            /* 任务列表横向滚动 */
            .task-list-section {
                padding: 15px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .task-table {
                min-width: 600px;
                font-size: 12px;
            }
            
            .task-table th,
            .task-table td {
                padding: 10px 8px;
            }
            
            .badge {
                font-size: 10px;
                padding: 3px 8px;
            }
            
            /* 加载动画适配 */
            .loading-text {
                font-size: 12px;
            }
            
            /* 刷新指示器 */
            .refresh-indicator {
                font-size: 11px;
            }
        }
        
        /* 超小屏幕适配 */
        @media screen and (max-width: 375px) {
            .header h1 {
                font-size: 16px;
            }
            
            .metric-value {
                font-size: 20px;
            }
            
            .agent-name {
                font-size: 14px;
            }
            
            .task-table {
                min-width: 500px;
            }
        }
        
        /* 触摸优化 */
        @media (hover: none) and (pointer: coarse) {
            .metric-card:hover {
                transform: none;
            }
            
            .refresh-btn {
                min-height: 36px;
                min-width: 70px;
            }
            
            .task-table tr:hover {
                background: transparent;
            }
        }
        
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .metric-card {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .metric-card:hover {
            transform: translateY(-2px);
            border-color: #58a6ff;
        }
        
        .metric-label {
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }
        
        .metric-value {
            font-size: 32px;
            font-weight: 700;
            color: #e6edf3;
        }
        
        .section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .section-header {
            padding: 16px 20px;
            background: #1c2128;
            border-bottom: 1px solid #30363d;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .section-title {
            font-size: 16px;
            font-weight: 600;
        }
        
        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            padding: 20px;
        }
        
        .agent-card {
            background: #0f1419;
            border: 1px solid #30363d;
            border-radius: 10px;
            padding: 20px;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .agent-card.leader {
            border-color: #ffd700;
            background: linear-gradient(135deg, #1a2332 0%, #0f1419 100%);
        }
        
        .agent-card:hover {
            border-color: #58a6ff;
            transform: translateY(-2px);
        }
        
        .agent-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .agent-name {
            font-size: 18px;
            font-weight: 600;
        }
        
        .agent-role {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: #23863633;
            color: #238636;
            border: 1px solid #238636;
        }
        
        .agent-role.leader {
            background: #ffd70033;
            color: #ffd700;
            border-color: #ffd700;
        }
        
        .agent-status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #8b949e;
        }
        
        .status-badge {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #238636;
        }
        
        .status-badge.offline {
            background: #6e7681;
        }
        
        .status-badge.busy {
            background: #f0883e;
            animation: blink 1s infinite;
        }
        
        .status-badge.error {
            background: #da3633;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .agent-tasks {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #30363d;
        }
        
        .task-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            font-size: 13px;
        }
        
        .task-status {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
        }
        
        .task-status.done {
            background: #238636;
        }
        
        .task-status.pending {
            background: #f0883e;
        }
        
        .task-status.todo {
            background: #30363d;
        }
        
        .task-list-section {
            padding: 20px;
        }
        
        .task-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .task-table th {
            text-align: left;
            padding: 12px;
            font-size: 12px;
            color: #8b949e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #30363d;
        }
        
        .task-table td {
            padding: 12px;
            border-bottom: 1px solid #21262d;
            font-size: 14px;
        }
        
        .task-table tr:hover {
            background: #1c2128;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .badge-high {
            background: #da363333;
            color: #da3633;
            border: 1px solid #da3633;
        }
        
        .badge-medium {
            background: #f0883e33;
            color: #f0883e;
            border: 1px solid #f0883e;
        }
        
        .badge-low {
            background: #58a6ff33;
            color: #58a6ff;
            border: 1px solid #58a6ff;
        }
        
        .timestamp {
            font-size: 12px;
            color: #6e7681;
        }
        
        .refresh-btn {
            background: #238636;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .refresh-btn:hover {
            background: #2ea043;
        }
        
        .refresh-btn:disabled {
            background: #30363d;
            cursor: not-allowed;
        }
        
        /* 错误提示 */
        .error-toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #da3633;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 1001;
            transform: translateX(150%);
            transition: transform 0.3s ease;
        }
        
        .error-toast.show {
            transform: translateX(0);
        }
        
        /* ==================== 移动端响应式适配 ==================== */
        
        /* 平板适配 (768px - 1024px) */
        @media (max-width: 1024px) {
            .container {
                padding: 20px;
            }
            
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 15px;
            }
            
            .agent-grid {
                grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
                gap: 15px;
                padding: 15px;
            }
        }
        
        /* 手机适配 (最大767px) */
        @media (max-width: 767px) {
            /* 基础布局调整 */
            body {
                font-size: 14px;
            }
            
            .container {
                padding: 12px;
            }
            
            /* 头部适配 */
            .header {
                padding: 12px 15px;
                flex-direction: column;
                gap: 10px;
                align-items: flex-start;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .header-controls {
                width: 100%;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 8px;
            }
            
            .status-indicator {
                font-size: 12px;
            }
            
            .refresh-indicator {
                font-size: 11px;
            }
            
            /* 指标卡片 - 手机单列 */
            .metrics-grid {
                grid-template-columns: 1fr;
                gap: 10px;
                margin-bottom: 20px;
            }
            
            .metric-card {
                padding: 15px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            
            .metric-card:hover {
                transform: none;
            }
            
            .metric-label {
                font-size: 12px;
                margin-bottom: 0;
            }
            
            .metric-value {
                font-size: 24px;
            }
            
            /* 区块标题适配 */
            .section-header {
                padding: 12px 15px;
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }
            
            .section-title {
                font-size: 15px;
            }
            
            /* 代理卡片 - 手机单列 */
            .agent-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 12px;
            }
            
            .agent-card {
                padding: 15px;
            }
            
            .agent-card:hover {
                transform: none;
            }
            
            .agent-name {
                font-size: 16px;
            }
            
            .agent-role {
                font-size: 10px;
                padding: 3px 8px;
            }
            
            .agent-status {
                font-size: 12px;
            }
            
            .agent-tasks {
                margin-top: 12px;
                padding-top: 12px;
            }
            
            .task-item {
                padding: 6px 0;
                font-size: 12px;
            }
            
            /* 按钮 - 触摸友好 (最小44px) */
            .refresh-btn {
                padding: 12px 20px;
                font-size: 14px;
                min-height: 44px;
                min-width: 100px;
                align-self: stretch;
                justify-content: center;
            }
            
            /* 表格横向滚动 */
            .task-list-section {
                padding: 12px;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
            }
            
            .task-table {
                min-width: 600px;
                font-size: 13px;
            }
            
            .task-table th,
            .task-table td {
                padding: 10px 8px;
                white-space: nowrap;
            }
            
            /* 徽章适配 */
            .badge {
                padding: 3px 8px;
                font-size: 10px;
            }
            
            /* 错误提示适配 */
            .error-toast {
                left: 15px;
                right: 15px;
                bottom: 15px;
                transform: translateY(150%);
            }
            
            .error-toast.show {
                transform: translateY(0);
            }
            
            /* 时间戳 */
            .timestamp {
                font-size: 11px;
            }
            
            /* 加载动画 */
            .spinner {
                width: 40px;
                height: 40px;
            }
            
            .loading-text {
                font-size: 13px;
            }
        }
        
        /* 小屏手机适配 (最大375px) */
        @media (max-width: 375px) {
            .header h1 {
                font-size: 16px;
            }
            
            .metric-value {
                font-size: 20px;
            }
            
            .agent-name {
                font-size: 14px;
            }
            
            .section-title {
                font-size: 14px;
            }
            
            .task-table {
                min-width: 500px;
                font-size: 12px;
            }
        }
        
        /* 横屏手机适配 */
        @media (max-height: 500px) and (orientation: landscape) {
            .header {
                padding: 8px 15px;
            }
            
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .metric-card {
                padding: 10px 15px;
            }
        }
        
        /* 触摸设备优化 */
        @media (hover: none) and (pointer: coarse) {
            .metric-card:hover,
            .agent-card:hover {
                transform: none;
                border-color: #30363d;
            }
            
            .metric-card:active,
            .agent-card:active {
                border-color: #58a6ff;
                background: #1c2128;
            }
            
            /* 增大触摸目标 */
            .refresh-btn {
                touch-action: manipulation;
            }

    </style>
</head>
<body>
    <!-- 加载遮罩 -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
        <div class="loading-text">正在加载数据...</div>
    </div>
    
    <!-- 错误提示 -->
    <div class="error-toast" id="errorToast"></div>
    
    <div class="header">
        <h1>🐺 狼牙团队监控仪表盘</h1>
        <div class="header-controls">
            <div class="refresh-indicator">
                <div class="refresh-icon idle" id="refreshIcon"></div>
                <span id="lastUpdate">更新于: --:--:--</span>
            </div>
            <div class="status-indicator">
                <div class="status-dot" id="systemStatusDot"></div>
                <span id="systemStatus">系统正常运行</span>
            </div>
            <span class="timestamp" id="current-time"></span>
        </div>
    </div>
    
    <div class="container">
        <!-- 核心指标 -->
        <div class="metrics-grid">
            <div class="metric-card">
                <div class="metric-label">活跃代理</div>
                <div class="metric-value" id="metric-agents">--/--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">今日完成任务</div>
                <div class="metric-value" id="metric-completed">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">待处理任务</div>
                <div class="metric-value" id="metric-pending">--</div>
            </div>
            <div class="metric-card">
                <div class="metric-label">系统运行时间</div>
                <div class="metric-value" id="uptime">--</div>
            </div>
        </div>
        
        <!-- 代理状态 -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">🤖 代理状态监控</div>
                <button class="refresh-btn" id="refreshBtn" onclick="refreshData()">
                    <span>↻</span> 刷新数据
                </button>
            </div>
            <div class="agent-grid" id="agentGrid">
                <!-- 动态生成代理卡片 -->
            </div>
        </div>
        
        <!-- 任务清单 -->
        <div class="section">
            <div class="section-header">
                <div class="section-title" id="taskListTitle">📋 明日任务清单</div>
                <span class="timestamp" id="taskCount">--个待执行任务</span>
            </div>
            <div class="task-list-section">
                <table class="task-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>负责人</th>
                            <th>任务</th>
                            <th>优先级</th>
                            <th>状态</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody">
                        <!-- 动态生成任务列表 -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <!-- 执行日志 -->
        <div class="section">
            <div class="section-header">
                <div class="section-title">📜 最近执行日志</div>
            </div>
            <div class="task-list-section">
                <table class="task-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>代理</th>
                            <th>操作</th>
                            <th>结果</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                        <!-- 动态生成日志 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    
    <script>
        // 配置
        const CONFIG = {
            apiUrl: './data/status.json',  // 使用本地静态JSON
            refreshInterval: 30000,
            retryDelay: 5000
        };
        
        // 状态
        let refreshTimer = null;
        let isLoading = false;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await fetchData();
            startAutoRefresh();
            updateTime();
            setInterval(updateTime, 1000);
        });
        
        // 获取数据
        async function fetchData() {
            if (isLoading) return;
            
            isLoading = true;
            showRefreshIndicator(true);
            document.getElementById('refreshBtn').disabled = true;
            
            try {
                // 使用本地JSON数据
                const url = `${CONFIG.apiUrl}?t=${Date.now()}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                updateDashboard(data);
                hideLoadingOverlay();
                showError('');
                
            } catch (error) {
                console.error('获取数据失败:', error);
                showError(`加载失败: ${error.message}`);
            } finally {
                isLoading = false;
                showRefreshIndicator(false);
                document.getElementById('refreshBtn').disabled = false;
                updateLastRefreshTime();
            }
        }
        
        // 更新仪表盘
        function updateDashboard(data) {
            // 更新系统状态
            updateSystemStatus(data.systemStatus, data.uptime);
            
            // 更新指标
            document.getElementById('metric-agents').textContent = 
                `${data.metrics.activeAgents}/${data.metrics.totalAgents}`;
            document.getElementById('metric-completed').textContent = data.metrics.completedTasks;
            document.getElementById('metric-pending').textContent = data.metrics.pendingTasks;
            document.getElementById('uptime').textContent = data.uptime;
            
            // 更新代理状态
            renderAgents(data.agents);
            
            // 更新任务列表
            renderTasks(data.tomorrowTasks);
            
            // 更新日志
            renderLogs(data.logs);
        }
        
        // 更新系统状态
        function updateSystemStatus(status, uptime) {
            const dot = document.getElementById('systemStatusDot');
            const text = document.getElementById('systemStatus');
            
            document.getElementById('uptime').textContent = uptime;
            
            switch (status) {
                case 'running':
                    dot.className = 'status-dot';
                    text.textContent = '系统正常运行';
                    break;
                case 'warning':
                    dot.className = 'status-dot busy';
                    text.textContent = '系统警告';
                    break;
                case 'error':
                    dot.className = 'status-dot error';
                    text.textContent = '系统异常';
                    break;
                default:
                    dot.className = 'status-dot';
                    text.textContent = '系统正常运行';
            }
        }
        
        // 渲染代理卡片
        function renderAgents(agents) {
            const container = document.getElementById('agentGrid');
            container.innerHTML = agents.map(agent => `
                <div class="agent-card ${agent.isLeader ? 'leader' : ''}" data-agent-id="${agent.id}">
                    <div class="agent-header">
                        <div class="agent-name">${agent.emoji} ${agent.name}</div>
                        <span class="agent-role ${agent.isLeader ? 'leader' : ''}">${agent.role}</span>
                    </div>
                    <div class="agent-status">
                        <div class="status-badge ${getStatusClass(agent.status, agent.isBusy)}"></div>
                        <span>${agent.statusText}</span>
                    </div>
                    <div class="agent-tasks">
                        ${agent.tasks.map(task => `
                            <div class="task-item">
                                <span class="task-status ${task.status}">${getTaskIcon(task.status)}</span>
                                <span>${task.text}</span>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }
        
        // 获取状态样式类
        function getStatusClass(status, isBusy) {
            if (status === 'offline') return 'offline';
            if (isBusy) return 'busy';
            if (status === 'error') return 'error';
            return '';
        }
        
        // 获取任务图标
        function getTaskIcon(status) {
            const icons = {
                'done': '✓',
                'pending': '◐',
                'todo': '○'
            };
            return icons[status] || '○';
        }
        
        // 渲染任务列表
        function renderTasks(tasks) {
            const tbody = document.getElementById('taskTableBody');
            const taskCount = tasks.filter(t => t.status === 'pending').length;
            document.getElementById('taskCount').textContent = `${taskCount}个待执行任务`;
            
            tbody.innerHTML = tasks.map(task => `
                <tr>
                    <td>${task.time}</td>
                    <td>${task.assignee}</td>
                    <td>${task.task}</td>
                    <td><span class="badge badge-${task.priority}">${getPriorityText(task.priority)}</span></td>
                    <td>${getStatusText(task.status)}</td>
                </tr>
            `).join('');
        }
        
        // 渲染日志
        function renderLogs(logs) {
            const tbody = document.getElementById('logTableBody');
            tbody.innerHTML = logs.map(log => `
                <tr>
                    <td class="timestamp">${log.time}</td>
                    <td>${log.agent}</td>
                    <td>${log.action}</td>
                    <td>${getResultIcon(log.result)} ${log.result}</td>
                </tr>
            `).join('');
        }
        
        // 获取优先级文本
        function getPriorityText(priority) {
            const map = { 'high': '高', 'medium': '中', 'low': '低' };
            return map[priority] || priority;
        }
        
        // 获取状态文本
        function getStatusText(status) {
            const map = {
                'pending': '⏳ 待执行',
                'in_progress': '🔄 进行中',
                'completed': '✅ 已完成',
                'failed': '❌ 失败'
            };
            return map[status] || status;
        }
        
        // 获取结果图标
        function getResultIcon(result) {
            return result === '成功' ? '✅' : '❌';
        }
        
        // 显示刷新指示器
        function showRefreshIndicator(loading) {
            const icon = document.getElementById('refreshIcon');
            if (loading) {
                icon.classList.remove('idle');
            } else {
                icon.classList.add('idle');
            }
        }
        
        // 更新时间
        function updateTime() {
            const now = new Date();
            const timeStr = now.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            document.getElementById('current-time').textContent = timeStr;
        }
        
        // 更新最后刷新时间
        function updateLastRefreshTime() {
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-CN');
            document.getElementById('lastUpdate').textContent = `更新于: ${timeStr}`;
        }
        
        // 隐藏加载遮罩
        function hideLoadingOverlay() {
            const overlay = document.getElementById('loadingOverlay');
            overlay.classList.add('hidden');
        }
        
        // 显示错误
        function showError(message) {
            const toast = document.getElementById('errorToast');
            if (message) {
                toast.textContent = message;
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 5000);
            } else {
                toast.classList.remove('show');
            }
        }
        
        // 刷新数据
        function refreshData() {
            fetchData();
        }
        
        // 启动自动刷新
        function startAutoRefresh() {
            if (refreshTimer) clearInterval(refreshTimer);
            refreshTimer = setInterval(() => {
                console.log('[自动刷新] 正在获取最新数据...');
                fetchData();
            }, CONFIG.refreshInterval);
        }
        
        // 停止自动刷新
        function stopAutoRefresh() {
            if (refreshTimer) {
                clearInterval(refreshTimer);
                refreshTimer = null;
            }
        }
        
        // 页面可见性变化处理
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                // 页面隐藏时降低刷新频率或暂停
                console.log('[仪表盘] 页面隐藏，降低刷新频率');
            } else {
                // 页面显示时立即刷新
                console.log('[仪表盘] 页面显示，立即刷新数据');
                fetchData();
            }
        });
    </script>
</body>
</html>
